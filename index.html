<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>十二段鍋物棠 聚餐投票</title>
    <style>
        body {
            font-family: '微軟正黑體', sans-serif;
            background-color: #f7f3e9;
            color: #333;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #d35400;
            font-size: 24px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            background-color: #fff;
        }
        .date-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .date-item {
            background-color: #fcece3;
            padding: 10px 5px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #f9d8c4;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        .date-item.selected {
            background-color: #d35400;
            color: white;
            font-weight: bold;
        }
        .date-item small {
            font-size: 12px;
            margin-top: 3px;
        }
        .weekend {
            color: #c0392b;
        }
        .selected.weekend {
            color: white;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #d35400;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #a04000;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍲 十二段鍋物棠 大里店 <br> 聚餐時間調查</h1>
    <p style="text-align: center; color: #666;">投票日期範圍：5/12 ~ 6/30</p>

    <label for="member">👤 你是哪一位？</label>
    <select id="member">
        <option value="" disabled selected>請選擇你的名字</option>
        <option value="阿吉">阿吉</option>
        <option value="Rita">Rita</option>
        <option value="MARY">MARY</option>
        <option value="Cherry">Cherry</option>
        <option value="花花">花花</option>
        <option value="旬">旬</option>
        <option value="ALiang">ALiang</option>
    </select>

    <label>📅 請點選你有空的日期（可複選，可往下捲動）：</label>
    <div class="date-grid" id="dateGrid">
        <!-- 由 JavaScript 自動產生日期選項 -->
    </div>

    <button id="submitBtn" onclick="submitVote()">送出投票</button>
</div>
